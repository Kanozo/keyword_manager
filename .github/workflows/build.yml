name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'

      - name: Regenerate Android project
        run: flutter create --platforms android --project-name keyword_manager .

      - name: Force compileSdk 36 and targetSdk 36
        run: |
          sed -i 's/compileSdkVersion = flutter.compileSdkVersion/compileSdkVersion = 36/' android/app/build.gradle
          sed -i 's/targetSdkVersion = flutter.targetSdkVersion/targetSdkVersion = 36/' android/app/build.gradle
          sed -i 's/minSdkVersion = flutter.minSdkVersion/minSdkVersion = 21/' android/app/build.gradle

      - name: Patch incompatible plugin build.gradle files
        run: |
          # Reemplazar flutter.compileSdkVersion por 36 en todos los plugins
          find ~/.pub-cache -name "build.gradle" -exec grep -l 'flutter.compileSdkVersion' {} \; | while read file; do
            echo "Patching $file"
            sed -i 's/flutter.compileSdkVersion/36/g' "$file"
            sed -i 's/flutter.targetSdkVersion/36/g' "$file"
            sed -i 's/flutter.minSdkVersion/21/g' "$file"
          done

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: |
          flutter build apk --release \
            --dart-define=SUPABASE_URL="${{ secrets.SUPABASE_URL }}" \
            --dart-define=SUPABASE_KEY="${{ secrets.SUPABASE_KEY }}"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk