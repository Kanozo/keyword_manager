name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 11 (requerido por AGP 7.x)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'

      - name: Regenerate Android project
        run: flutter create --platforms android --project-name keyword_manager .

      - name: Downgrade to AGP 7.4.2 and Gradle 7.6.3 (compatibles con plugins)
        run: |
          # Eliminar caché corrupta
          rm -rf ~/.gradle/caches

          # Modificar classpath a AGP 7.4.2
          sed -i "s|classpath 'com.android.tools.build:gradle:.*'|classpath 'com.android.tools.build:gradle:7.4.2'|" android/build.gradle

          # Actualizar Gradle wrapper a 7.6.3
          sed -i 's|distributionUrl=.*|distributionUrl=https\\://services.gradle.org/distributions/gradle-7.6.3-bin.zip|' android/gradle/wrapper/gradle-wrapper.properties

          # Reemplazar compileSdkVersion flutter.compileSdkVersion por 33 (máximo para AGP 7.4 sin warnings)
          sed -i 's|compileSdkVersion flutter.compileSdkVersion|compileSdkVersion 33|' android/app/build.gradle

          # Ajustar targetSdkVersion y minSdkVersion por si acaso
          sed -i 's|targetSdkVersion flutter.targetSdkVersion|targetSdkVersion 33|' android/app/build.gradle
          sed -i 's|minSdkVersion flutter.minSdkVersion|minSdkVersion 21|' android/app/build.gradle

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses || true

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: |
          flutter build apk --release \
            --dart-define=SUPABASE_URL="${{ secrets.SUPABASE_URL }}" \
            --dart-define=SUPABASE_KEY="${{ secrets.SUPABASE_KEY }}"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk