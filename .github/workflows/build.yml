name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'

      - name: Regenerate Android project
        run: flutter create --platforms android --project-name keyword_manager .

      - name: Update Kotlin version to 2.1.0
        run: |
          sed -i 's/org.jetbrains.kotlin.android" version "[^"]*"/org.jetbrains.kotlin.android" version "2.1.0"/' android/settings.gradle
          grep -q 'org.jetbrains.kotlin.android' android/settings.gradle || \
            sed -i '/plugins {/a\    id "org.jetbrains.kotlin.android" version "2.1.0" apply false' android/settings.gradle

      - name: Force compileSdk 36, targetSdk 36, minSdk 23
        run: |
          # Reemplazar las líneas completas que contengan estas propiedades
          sed -i 's/^.*compileSdkVersion.*/compileSdkVersion 36/' android/app/build.gradle
          sed -i 's/^.*targetSdkVersion.*/targetSdkVersion 36/' android/app/build.gradle
          sed -i 's/^.*minSdkVersion.*/minSdkVersion 23/' android/app/build.gradle

          # Si después del reemplazo queda alguna línea usando flutter.compileSdkVersion, la eliminamos
          sed -i '/flutter\.compileSdkVersion/d' android/app/build.gradle
          sed -i '/flutter\.targetSdkVersion/d' android/app/build.gradle
          sed -i '/flutter\.minSdkVersion/d' android/app/build.gradle

      - name: Install dependencies
        run: flutter pub get

      - name: Patch any remaining plugin using flutter.compileSdkVersion
        run: |
          find ~/.pub-cache -name "build.gradle" -exec grep -l 'flutter.compileSdkVersion' {} \; | while read file; do
            echo "Patching $file"
            sed -i 's/flutter.compileSdkVersion/36/g' "$file"
            sed -i 's/flutter.targetSdkVersion/36/g' "$file"
            sed -i 's/flutter.minSdkVersion/23/g' "$file"
          done

      - name: Build APK
        run: |
          flutter build apk --release \
            --dart-define=SUPABASE_URL="${{ secrets.SUPABASE_URL }}" \
            --dart-define=SUPABASE_KEY="${{ secrets.SUPABASE_KEY }}"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk