name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'

      - name: Regenerate Android project
        run: flutter create --platforms android --project-name keyword_manager .

      - name: Configure Gradle for modern plugins
        run: |
          # Limpiar caché corrupta
          rm -rf ~/.gradle/caches

          # AGP 8.2.2 y Gradle 8.2
          sed -i "s|classpath 'com.android.tools.build:gradle:.*'|classpath 'com.android.tools.build:gradle:8.2.2'|" android/build.gradle
          sed -i 's|distributionUrl=.*|distributionUrl=https\\://services.gradle.org/distributions/gradle-8.2-bin.zip|' android/gradle/wrapper/gradle-wrapper.properties

          # compileSdk 34 explícito en la app
          sed -i 's|compileSdkVersion flutter.compileSdkVersion|compileSdkVersion 34|' android/app/build.gradle

          # ─── CLAVE: definir ext.flutter en el build.gradle raíz ───
          # Insertamos un bloque que provee las propiedades que los plugins esperan.
          # Se añade justo antes del buildscript o al inicio del archivo.
          cat << 'EOF' > /tmp/flutter_ext.gradle
          ext {
              flutter = [
                  compileSdkVersion: 34,
                  minSdkVersion    : 21,
                  targetSdkVersion : 34
              ]
          }
          EOF
          # Insertamos el contenido después de cualquier línea "buildscript {" o al principio
          if grep -q "buildscript {" android/build.gradle; then
              sed -i '/buildscript {/i\ext {\n    flutter = [\n        compileSdkVersion: 34,\n        minSdkVersion    : 21,\n        targetSdkVersion : 34\n    ]\n}\n' android/build.gradle
          else
              # Si no hay buildscript (raro), lo ponemos al inicio del archivo
              sed -i '1i\ext {\n    flutter = [\n        compileSdkVersion: 34,\n        minSdkVersion    : 21,\n        targetSdkVersion : 34\n    ]\n}\n' android/build.gradle
          fi

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses || true

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: |
          flutter build apk --release \
            --dart-define=SUPABASE_URL="${{ secrets.SUPABASE_URL }}" \
            --dart-define=SUPABASE_KEY="${{ secrets.SUPABASE_KEY }}"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk