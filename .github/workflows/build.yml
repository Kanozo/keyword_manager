name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'

      - name: Regenerate Android project
        run: flutter create --platforms android --project-name keyword_manager .

      - name: Patch incompatible plugins (app_links, package_info_plus)
        run: |
          PUB_CACHE="$HOME/.pub-cache/hosted/pub.dev"
          # Reemplazar flutter.compileSdkVersion por 34 en todos los plugins que lo usen
          find "$PUB_CACHE" -name "build.gradle" -exec grep -l 'flutter.compileSdkVersion' {} \; | while read file; do
            echo "Patching $file"
            sed -i 's/flutter.compileSdkVersion/34/g' "$file"
            sed -i 's/flutter.minSdkVersion/21/g' "$file"
            sed -i 's/flutter.targetSdkVersion/34/g' "$file"
          done

      - name: Force modern Gradle configuration
        run: |
          # AGP classpath a 8.2.2
          sed -i "s|classpath 'com.android.tools.build:gradle:.*'|classpath 'com.android.tools.build:gradle:8.2.2'|" android/build.gradle
          # compileSdkVersion explícito para la app
          sed -i 's|compileSdkVersion flutter.compileSdkVersion|compileSdkVersion 34|' android/app/build.gradle
          # Gradle wrapper a 8.2
          sed -i 's|distributionUrl=.*|distributionUrl=https\\://services.gradle.org/distributions/gradle-8.2-bin.zip|' android/gradle/wrapper/gradle-wrapper.properties

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses || true

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: |
          flutter build apk --release \
            --dart-define=SUPABASE_URL="${{ secrets.SUPABASE_URL }}" \
            --dart-define=SUPABASE_KEY="${{ secrets.SUPABASE_KEY }}"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk