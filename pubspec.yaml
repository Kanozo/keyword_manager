name: keyword_manager
description: Gestión de keywords de Supabase.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.5.0
  intl: ^0.19.0

dependency_overrides:
  # Forzar versiones que funcionan con AGP 8 (Gradle 8+)
  app_links: 6.5.1          # versión confirmada compatible
  package_info_plus: 8.2.0  # versión confirmada compatible

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true